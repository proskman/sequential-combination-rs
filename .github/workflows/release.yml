name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: sequential-combination-rs.exe
            asset_name: sequential-combination-rs-windows-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sequential-combination-rs
            asset_name: sequential-combination-rs-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sequential-combination-rs
            asset_name: sequential-combination-rs-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🦀 Sequential Combination MCP ${{ github.ref_name }}"
          body: |
            ## Installation (no Rust or Python required!)
            Download the binary for your OS:
            - 🪟 Windows: `sequential-combination-rs-windows-x64.exe`
            - 🐧 Linux: `sequential-combination-rs-linux-x64`
            - 🍎 macOS: `sequential-combination-rs-macos-arm64`

            ### VSCode Config
            ```json
            {
              "mcpServers": {
                "sequential-combination-rs": {
                  "command": "/path/to/sequential-combination-rs.exe",
                  "env": { "MCP_BASE_DIR": "/path/to/folder" }
                }
              }
            }
            ```
          files: binaries/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
